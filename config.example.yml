        .safetensors\"):\n            model_name += \".safetensors\"\n\n        safe_set(1,\
        \ \"ckpt_name\", model_name)\n        safe_set(11, \"vae_name\", \"Baked VAE\"\
        )\n        # здесь у тебя всегда None — оставим так, т.к. LoRA переключаем\
        \ отдельно\n        safe_set(11, \"lora_name\", \"None\")\n    else:\n   \
        \     safe_set(11, \"lora_name\", \"None\")\n        safe_set(11, \"vae_name\"\
        , \"Baked VAE\")\n        safe_set(1, \"ckpt_name\", \"aozoraXLVpred_v01AlphaVpred.safetensors\"\
        )\n\n    # lora → через LoRA Stacker (если есть)\n    ls_id = find_lora_stacker(\"\
        111\")\n    lora_strength = float(params.get(\"lora_strength\", 1.0))\n\n\
        \    def apply_lora_stack(names, strength):\n        if not ls_id:\n     \
        \       return\n\n        inp = workflowjson[ls_id].setdefault(\"inputs\"\
        , {})\n\n        # easy loraStack (EasyUse)\n        if \"lora_1_name\" in\
        \ inp:\n            if not names:\n                inp[\"toggle\"] = False\n\
        \                inp[\"num_loras\"] = 1\n                inp[\"lora_1_name\"\
        ] = \"None\"\n                inp[\"lora_1_strength\"] = 0.0\n           \
        \     inp[\"lora_1_model_strength\"] = 0.0\n                inp[\"lora_1_clip_strength\"\
        ] = 0.0\n                for i in range(2, 11):\n                    inp[f\"\
        lora_{i}_name\"] = \"None\"\n                return\n\n            inp[\"\
        toggle\"] = True\n            inp[\"num_loras\"] = int(len(names))\n     \
        \       for idx, name in enumerate(names, start=1):\n                inp[f\"\
        lora_{idx}_name\"] = name\n                inp[f\"lora_{idx}_strength\"] =\
        \ strength\n                inp[f\"lora_{idx}_model_strength\"] = strength\n\
        \                inp[f\"lora_{idx}_clip_strength\"] = strength\n         \
        \   for idx in range(len(names) + 1, 11):\n                inp[f\"lora_{idx}_name\"\
        ] = \"None\"\n\n            return\n\n        # rgthree Lora Loader Stack\n\
        \        if \"lora_01\" in inp:\n            if not names:\n             \
        \   for i in range(1, 5):\n                    inp[f\"lora_{i:02d}\"] = \"\
        None\"\n                    inp[f\"strength_{i:02d}\"] = 0.0\n           \
        \     return\n\n            for idx, name in enumerate(names, start=1):\n\
        \                if idx > 4:\n                    break\n                inp[f\"\
        lora_{idx:02d}\"] = name\n                inp[f\"strength_{idx:02d}\"] = strength\n\
        \n            for idx in range(len(names) + 1, 5):\n                inp[f\"\
        lora_{idx:02d}\"] = \"None\"\n                inp[f\"strength_{idx:02d}\"\
        ] = 0.0\n\n            return\n\n        # старый LoRA Stacker\n        if\
        \ not names:\n            for i in (1, 2):\n                inp[f\"lora_name_{i}\"\
        ] = \"None\"\n                inp[f\"model_str_{i}\"] = 0.0\n            \
        \    inp[f\"clip_str_{i}\"] = 0.0\n                inp[f\"lora_wt_{i}\"] =\
        \ 0.0\n            return\n\n        for i, name in enumerate(names, start=1):\n\
        \            if i > 2:\n                break\n            inp[f\"lora_name_{i}\"\
        ] = name\n            inp[f\"model_str_{i}\"] = strength\n            inp[f\"\
        clip_str_{i}\"] = strength\n            inp[f\"lora_wt_{i}\"] = strength\n\
        \n        for i in range(len(names) + 1, 3):\n            inp[f\"lora_name_{i}\"\
        ] = \"None\"\n            inp[f\"model_str_{i}\"] = 0.0\n            inp[f\"\
        clip_str_{i}\"] = 0.0\n            inp[f\"lora_wt_{i}\"] = 0.0\n\n    if \"\
        lora\" in params:\n        lora_name = params[\"lora\"]\n        if not lora_name.endswith(\"\
        .safetensors\"):\n            lora_name += \".safetensors\"\n\n        if\
        \ lora_name.startswith(\"samekosaba\"):\n            apply_lora_stack([\"\
        samekosaba.safetensors\", \"samekosaba2.safetensors\"], lora_strength)\n \
        \       else:\n            apply_lora_stack([lora_name], lora_strength)\n\
        \    else:\n        apply_lora_stack([], 0.0)\n"
