        , random.randint(0, 2**32 - 1))\n\n    if \"cfg\" in params:\n        safe_set(75,\
        \ \"value\", float(str(params[\"cfg\"]).replace(\",\", \".\")))\n    else:\n\
        \        safe_set(75, \"value\", 6.0)\n\n    # model\n    if \"model\" in\
