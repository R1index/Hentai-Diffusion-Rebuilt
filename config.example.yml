        , random.randint(0, 2**32 - 1))\n    safe_set(75, \"value\", 6.0)\n\n    #\
        \ LoRA Stacker / EasyLoraStack: выключаем по умолчанию\n    ls_id = find_lora_stacker(\"\
        111\")\n    if ls_id:\n        inp = workflowjson[ls_id].setdefault(\"inputs\"\
        , {})\n        # easy loraStack (EasyUse)\n        if \"lora_1_name\" in inp:\n\
        \            inp[\"toggle\"] = False\n            inp[\"num_loras\"] = 1\n\
        \            inp[\"lora_1_name\"] = \"None\"\n            inp[\"lora_1_strength\"\
        ] = 0.0\n            inp[\"lora_1_model_strength\"] = 0.0\n            inp[\"\
        lora_1_clip_strength\"] = 0.0\n            for i in range(2, 11):\n      \
        \          inp[f\"lora_{i}_name\"] = \"None\"\n        # rgthree Lora Loader\
        \ Stack\n        elif \"lora_01\" in inp:\n            for i in range(1, 5):\n\
        \                inp[f\"lora_{i:02d}\"] = \"None\"\n                inp[f\"\
        strength_{i:02d}\"] = 0.0\n        else:\n            for i in (1, 2):\n \
        \               inp[f\"lora_name_{i}\"] = \"None\"\n                inp[f\"\
        model_str_{i}\"] = 0.0\n                inp[f\"clip_str_{i}\"] = 0.0\n   \
        \             inp[f\"lora_wt_{i}\"] = 0.0\n"
    - name: config
      description: Configure generation parameters (model, lora, seed, cfg)
      code: "def config(workflowjson, *args):\n    import random\n\n    def get(node_id):\n\
        \        return workflowjson.get(str(node_id))\n\n    def find_lora_stacker(fallback_id=\"\
        111\"):\n        n = workflowjson.get(str(fallback_id))\n        if n and\
        \ n.get(\"class_type\", \"\").lower().find(\"lora\") != -1 and \"inputs\"\
        \ in n:\n            return str(fallback_id)\n\n        for k, v in workflowjson.items():\n\
        \            class_type = v.get(\"class_type\", \"\").lower() if isinstance(v,\
        \ dict) else \"\"\n            if \"lora stacker\" in class_type or \"lora\
        \ loader stack\" in class_type:\n                return k\n\n        return\
        \ None\n\n    def safe_set(node_id, key, value):\n        n = get(node_id)\n\
        \        if n and \"inputs\" in n:\n            n[\"inputs\"][key] = value\n\
        \n    params = {}\n    for arg in args:\n        if \"=\" in arg:\n      \
        \      key, value = arg.split(\"=\", 1)\n            params[key.strip()] =\
